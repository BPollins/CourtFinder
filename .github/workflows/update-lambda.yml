name: Update Lambda

on:
  workflow_dispatch:
    inputs:
      lambda:
        description: Lambda package to deploy (or 'all')
        required: true
        type: string

  push:
    branches: [main]
    paths:
      - "lambdas/**"

permissions:
  contents: read

jobs:
  prepare:
    name: Build deploy matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed lambda files
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            lambdas:
              - 'lambdas/**'

      - name: Build lambda matrix
        id: matrix
        run: |
          set -euo pipefail

          live_lambdas="$(jq -c '.' .github/live_lambdas.json)"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selected="${{ github.event.inputs.lambda }}"
            if [[ "$selected" == "all" ]]; then
              matrix="$live_lambdas"
            else
              matrix="$(jq -c --arg selected "$selected" '[.[] | select(.lambda == $selected)]' <<< "$live_lambdas")"
              if [[ "$matrix" == "[]" ]]; then
                echo "Unknown lambda: $selected"
                echo "Valid values are: all $(jq -r '.[].lambda' .github/live_lambdas.json | sed 's/^/ /')"
                exit 1
              fi
            fi
          else
            changed_files='${{ steps.filter.outputs.lambdas_files }}'
            changed_lambdas="$(
              for file in $changed_files; do
                if [[ "$file" == lambdas/*/* ]]; then
                  echo "$file" | awk -F/ '{print $2}'
                fi
              done | sort -u
            )"

            if [[ -z "$changed_lambdas" ]]; then
              matrix="[]"
            else
              matrix="$(jq -c --arg changed "$changed_lambdas" '
                ($changed | split("\n") | map(select(length > 0))) as $names
                | map(select(.lambda as $l | ($names | index($l)) != null))
              ' <<< "$live_lambdas")"
            fi
          fi

          echo "debug: event_name=${{ github.event_name }}"
          echo "debug: filter.lambdas=${{ steps.filter.outputs.lambdas }}"
          echo "debug: filter.lambdas_files=${{ steps.filter.outputs.lambdas_files }}"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "debug: changed_files=${changed_files-}"
            echo "debug: changed_lambdas=${changed_lambdas-}"
          fi
          echo "debug: matrix_before_sentinel=${matrix}"

          if [[ -z "$matrix" ]]; then
            echo "debug: matrix was empty after build; treating as no deploy"
            matrix="[]"
          fi

          if [[ "$matrix" == "[]" ]]; then
            has_changes=false
            matrix='[{"lambda":"__no_deploy__","path":".","lambda_var":"__no_deploy__"}]'
          else
            has_changes=true
          fi

          eof_delim="MATRIX_JSON_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_$(openssl rand -hex 8)"
          {
            echo "matrix<<$eof_delim"
            printf '%s\n' "$matrix"
            echo "$eof_delim"
          } >> "$GITHUB_OUTPUT"
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.lambda }}
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/deploy-lambda.yml
    with:
      lambda_path: ${{ matrix.path }}
      lambda_name: ${{ vars[matrix.lambda_var] }}
    secrets: inherit
